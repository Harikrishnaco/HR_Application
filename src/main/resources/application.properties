# Local In-Memory Database Setup
server.port=8081
spring.datasource.url=jdbc:h2:mem:hrmsdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA settings to match PostgreSQL behavior
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 Web Console so you can see your tables in the browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console